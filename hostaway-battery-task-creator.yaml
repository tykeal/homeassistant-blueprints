blueprint:
  name: Hostaway Battery Task Creator (v0.10)
  description: >-
    Creates or updates Hostaway battery replacement tasks for low
    battery sensors and completes them after batteries recover.
  domain: automation
  input:
    threshold:
      name: Battery warning level
      description: >-
        Battery sensors below this threshold will create or update
        a Hostaway task.
      default: 20
      selector:
        number:
          min: 5
          max: 100
          step: 5
          mode: slider
          unit_of_measurement: "%"
    recovery_threshold:
      name: Battery recovered level
      description: >-
        Battery sensors at or above this level will complete any
        matching Hostaway task.
      default: 80
      selector:
        number:
          min: 50
          max: 100
          step: 5
          mode: slider
          unit_of_measurement: "%"
    interval:
      name: Periodic check interval
      description: How often to run the battery check.
      default: "/30"
      selector:
        select:
          options:
            - label: Every 5 minutes
              value: "/5"
            - label: Every 10 minutes
              value: "/10"
            - label: Every 15 minutes
              value: "/15"
            - label: Every 30 minutes
              value: "/30"
            - label: Every hour
              value: "0"
    supervisor_user_id:
      name: Supervisor user ID
      description: >-
        Hostaway supervisor user ID. Find this via Developer Tools
        → Services → hostaway.get_users.
      selector:
        number:
          min: 1
          mode: box
    can_be_picked_by_group_id:
      name: Group assignment ID
      description: >-
        Hostaway group ID that can pick up the created task. Find
        this via Developer Tools → Services → hostaway.get_groups.
      selector:
        number:
          min: 1
          mode: box
    assignee_user_id:
      name: Assignee user ID
      description: >-
        Optional Hostaway user ID to assign created tasks to. Leave
        at 0 for no specific assignment. Find user IDs via Developer
        Tools → Services → hostaway.get_users.
      default: 0
      selector:
        number:
          min: 0
          mode: box
    task_category:
      name: Task category IDs
      description: >-
        Optional category ID list to send as categories_map when
        creating a Hostaway task.
      default: []
      selector:
        object: {}
    exclude:
      name: Excluded battery sensors
      description: >-
        Battery sensors to exclude from low-battery detection.
        Only entities are supported.
      # yamllint disable rule:braces
      default: { entity_id: [] }
      # yamllint enable rule:braces
      selector:
        target:
          entity:
            device_class: battery
    config_entry_id:
      name: Hostaway config entry
      description: >-
        Target a specific Hostaway config entry. Only required
        when multiple Hostaway accounts are configured.
      default: ""
      selector:
        config_entry:
          integration: hostaway
    on_task_created:
      name: Actions on task created
      description: >-
        Optional actions to run after one or more new Hostaway
        battery tasks are created. Runs once at the end of the check.
        The {{ tasks }} variable is a list of dicts, one per created
        task, each with: listing_name, device_name, entity_id,
        battery_percent, battery_type, task_id.
      default: []
      selector:
        action: {}
    on_task_rescheduled:
      name: Actions on task rescheduled
      description: >-
        Optional actions to run after one or more existing Hostaway
        battery tasks are rescheduled (start/end times updated). Runs
        once at the end of the check. The {{ tasks }} variable is a
        list of dicts, one per rescheduled task, each with:
        listing_name, device_name, entity_id, battery_percent,
        battery_type, task_id.
      default: []
      selector:
        action: {}
    on_task_completed:
      name: Actions on task completed
      description: >-
        Optional actions to run after one or more Hostaway battery
        tasks are completed because the battery recovered. Runs once
        at the end of the check. The {{ tasks }} variable is a list of
        dicts, one per completed task, each with: listing_name,
        device_name, entity_id, battery_percent, battery_type,
        task_id.
      default: []
      selector:
        action: {}

variables:
  threshold: !input threshold
  recovery_threshold: !input recovery_threshold
  supervisor_user_id: !input supervisor_user_id
  can_be_picked_by_group_id: !input can_be_picked_by_group_id
  assignee_user_id: !input assignee_user_id
  task_category: !input task_category
  exclude: !input exclude
  config_entry_id: !input config_entry_id
  on_task_created: !input on_task_created
  on_task_rescheduled: !input on_task_rescheduled
  on_task_completed: !input on_task_completed
  created_tasks: []
  rescheduled_tasks: []
  completed_tasks: []
  low_batteries: >-
    {% set ns = namespace(items=[], seen_devices=[]) %}
    {% for state in states.sensor
       | selectattr('attributes.device_class', '==', 'battery') %}
      {% if 0 <= state.state | int(-1) < threshold | int
         and state.entity_id not in (exclude.entity_id | default([], true)) %}
        {% set did = device_id(state.entity_id) %}
        {% set area = area_name(did) %}
        {% if area %}
          {% if did not in ns.seen_devices %}
            {% set dev = device_attr(
              did,
              'name'
            ) | default(state.name, true) %}
            {% set slug = dev | slugify | replace('-', '_') %}
            {% set btype_state =
              states('sensor.' ~ slug ~ '_battery_type') %}
            {% set btype =
              btype_state if btype_state not in [
                'unknown',
                'unavailable',
                'none',
                ''
              ] else 'unknown' %}
            {% set ns.items = ns.items + [dict(
              entity_id=state.entity_id,
              name=dev,
              area=area,
              slug=slug,
              percent=state.state | int(-1),
              battery_type=btype
            )] %}
            {% set ns.seen_devices = ns.seen_devices + [did] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {% for state in states.binary_sensor
       | selectattr('attributes.device_class', '==', 'battery') %}
      {% if state.state == 'on'
         and state.entity_id not in (exclude.entity_id | default([], true)) %}
        {% set did = device_id(state.entity_id) %}
        {% set area = area_name(did) %}
        {% if area %}
          {% if did not in ns.seen_devices %}
            {% set dev = device_attr(
              did,
              'name'
            ) | default(state.name, true) %}
            {% set slug = dev | slugify | replace('-', '_') %}
            {% set btype_state =
              states('sensor.' ~ slug ~ '_battery_type') %}
            {% set btype =
              btype_state if btype_state not in [
                'unknown',
                'unavailable',
                'none',
                ''
              ] else 'unknown' %}
            {% set ns.items = ns.items + [dict(
              entity_id=state.entity_id,
              name=dev,
              area=area,
              slug=slug,
              percent=0,
              battery_type=btype
            )] %}
            {% set ns.seen_devices = ns.seen_devices + [did] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.items }}
  recovered_batteries: >-
    {% set ns = namespace(items=[], seen_devices=[]) %}
    {% for state in states.sensor
       | selectattr('attributes.device_class', '==', 'battery') %}
      {% if 0 <= state.state | int(-1)
         and state.state | int(-1) >= recovery_threshold | int
         and state.entity_id not in (exclude.entity_id | default([], true)) %}
        {% set did = device_id(state.entity_id) %}
        {% set area = area_name(did) %}
        {% if area %}
          {% if did not in ns.seen_devices %}
            {% set dev = device_attr(
              did,
              'name'
            ) | default(state.name, true) %}
            {% set slug = dev | slugify | replace('-', '_') %}
            {% set btype_state =
              states('sensor.' ~ slug ~ '_battery_type') %}
            {% set btype =
              btype_state if btype_state not in [
                'unknown',
                'unavailable',
                'none',
                ''
              ] else 'unknown' %}
            {% set ns.items = ns.items + [dict(
              entity_id=state.entity_id,
              name=dev,
              area=area,
              slug=slug,
              percent=state.state | int(-1),
              battery_type=btype
            )] %}
            {% set ns.seen_devices = ns.seen_devices + [did] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {% for state in states.binary_sensor
       | selectattr('attributes.device_class', '==', 'battery') %}
      {% if state.state == 'off'
         and state.entity_id not in (exclude.entity_id | default([], true)) %}
        {% set did = device_id(state.entity_id) %}
        {% set area = area_name(did) %}
        {% if area %}
          {% if did not in ns.seen_devices %}
            {% set dev = device_attr(
              did,
              'name'
            ) | default(state.name, true) %}
            {% set slug = dev | slugify | replace('-', '_') %}
            {% set btype_state =
              states('sensor.' ~ slug ~ '_battery_type') %}
            {% set btype =
              btype_state if btype_state not in [
                'unknown',
                'unavailable',
                'none',
                ''
              ] else 'unknown' %}
            {% set ns.items = ns.items + [dict(
              entity_id=state.entity_id,
              name=dev,
              area=area,
              slug=slug,
              percent=100,
              battery_type=btype
            )] %}
            {% set ns.seen_devices = ns.seen_devices + [did] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.items }}

triggers:
  - trigger: time_pattern
    minutes: !input interval

actions:
  - if:
      - condition: template
        value_template: "{{ threshold | int >= recovery_threshold | int }}"
    then:
      - action: system_log.write
        data:
          level: warning
          message: >-
            Hostaway Battery Task Creator is misconfigured:
            threshold must be below recovery_threshold.
      - stop: Invalid threshold configuration
  - repeat:
      for_each: "{{ low_batteries }}"
      sequence:
        - variables:
            listing_name: "{{ repeat.item.area }}"
            title: >-
              Replace Batteries: {{ repeat.item.area }}
              - {{ repeat.item.name }} - {{ repeat.item.battery_type }}
            task_source_marker: >-
              Source entity: {{ repeat.item.entity_id }}
            res_sensor: >-
              sensor.hostaway_{{ repeat.item.area | slugify
              | replace('-', '_') }}_reservation_status
            res_state: "{{ states(res_sensor) }}"
            check_out: "{{ state_attr(res_sensor, 'check_out') }}"
            can_start_from: >-
              {%- if res_state in [
                'checked_in',
                'awaiting_checkin',
                'awaiting_guest',
                'pending_approval',
                'owner_stay'
              ] and check_out not in ['', none] -%}
                {%- set co_dt = as_datetime(check_out) -%}
                {%- if co_dt is not none -%}
                  {%- set eleven = co_dt.replace(
                    hour=11,
                    minute=0,
                    second=0
                  ) -%}
                  {%- if co_dt > eleven -%}
                    {{- co_dt.strftime('%Y-%m-%d %H:%M:%S') -}}
                  {%- else -%}
                    {{- eleven.strftime('%Y-%m-%d %H:%M:%S') -}}
                  {%- endif -%}
                {%- else -%}
                  {{- now().strftime('%Y-%m-%d') ~ ' 11:00:00' -}}
                {%- endif -%}
              {%- else -%}
                {{- now().strftime('%Y-%m-%d') ~ ' 11:00:00' -}}
              {%- endif -%}
            should_end_by: >-
              {%- set ns = namespace(next_checkin_dt=none) -%}
              {%- set start_dt = as_datetime(can_start_from) -%}
              {%- if start_dt is none -%}
                {%- set start_dt = now() -%}
              {%- endif -%}
              {%- set three_days = start_dt + timedelta(days=3) -%}
              {%- set default_end_dt = three_days.replace(
                hour=15,
                minute=0,
                second=0
              ) -%}
              {%- for reservation in
                 state_attr(res_sensor, 'upcoming_reservations')
                 | default([], true) -%}
                {%- set next_start =
                  reservation.check_in | default(none, true) -%}
                {%- if next_start not in ['', none] -%}
                  {%- set next_dt = as_datetime(next_start) -%}
                  {%- if next_dt is not none and next_dt > start_dt -%}
                    {%- if ns.next_checkin_dt is none
                       or next_dt < ns.next_checkin_dt -%}
                      {%- set ns.next_checkin_dt = next_dt -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endfor -%}
              {%- if ns.next_checkin_dt is not none
                 and ns.next_checkin_dt < default_end_dt -%}
                {%- set one_hour_before =
                  ns.next_checkin_dt - timedelta(hours=1) -%}
                {%- set fifteen = ns.next_checkin_dt.replace(
                  hour=15,
                  minute=0,
                  second=0
                ) -%}
                {%- if one_hour_before < fifteen -%}
                  {%- set candidate_end_dt = one_hour_before -%}
                {%- else -%}
                  {%- set candidate_end_dt = fifteen -%}
                {%- endif -%}
                {%- if candidate_end_dt < start_dt -%}
                  {{- start_dt.strftime('%Y-%m-%d %H:%M:%S') -}}
                {%- else -%}
                  {{- candidate_end_dt.strftime('%Y-%m-%d %H:%M:%S') -}}
                {%- endif -%}
              {%- else -%}
                {{- default_end_dt.strftime('%Y-%m-%d %H:%M:%S') -}}
              {%- endif -%}
        - action: hostaway.get_tasks
          data: >-
            {%- if config_entry_id -%}
              {{- dict(
                listing_name=listing_name | string,
                config_entry_id=config_entry_id
              ) -}}
            {%- else -%}
              {{- dict(listing_name=listing_name | string) -}}
            {%- endif -%}
          response_variable: existing_tasks
        - variables:
            matching_task_info: >-
              {% set ns = namespace(tid=none, csf='', seb='') %}
              {% for task in existing_tasks.tasks | default([], true) %}
                {% if ns.tid is none %}
                  {% set task_title =
                    task.title | default('', true) | string %}
                  {% set task_description =
                    task.description | default('', true) | string %}
                  {% if (task_source_marker in task_description
                     or task_title == title)
                     and task.status | default('', true)
                     not in ['completed', 'cancelled'] %}
                    {% set ns.tid = task.id %}
                    {% set raw_csf = task.canStartFrom | default('', true) %}
                    {% if raw_csf not in ['', none] %}
                      {% set parsed = as_datetime(raw_csf) %}
                      {% if parsed is not none %}
                        {% set ns.csf = parsed.strftime('%Y-%m-%d %H:%M:%S') %}
                      {% endif %}
                    {% endif %}
                    {% set raw_seb = task.shouldEndBy | default('', true) %}
                    {% if raw_seb not in ['', none] %}
                      {% set parsed = as_datetime(raw_seb) %}
                      {% if parsed is not none %}
                        {% set ns.seb = parsed.strftime('%Y-%m-%d %H:%M:%S') %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ dict(
                id=ns.tid,
                can_start_from=ns.csf,
                should_end_by=ns.seb
              ) }}
        - choose:
            - conditions:
                - condition: template
                  value_template: >-
                    {{ matching_task_info.id is none
                       and (task_category | default([], true) | count > 0) }}
              sequence:
                - action: hostaway.create_task
                  data: >-
                    {%- if config_entry_id and assignee_user_id | int > 0 -%}
                      {{- dict(
                        title=title | string,
                        listing_name=listing_name | string,
                        supervisor_user_id=supervisor_user_id | int,
                        can_be_picked_by_group_id=
                        can_be_picked_by_group_id | int,
                        can_start_from=can_start_from | trim | string,
                        should_end_by=should_end_by | trim | string,
                        status='pending',
                        categories_map=task_category,
                        description='Battery at '
                        ~ repeat.item.percent
                        ~ '% on '
                        ~ repeat.item.name ~ ' in ' ~ repeat.item.area
                        ~ '\n' ~ task_source_marker,
                        assignee_user_id=assignee_user_id | int,
                        config_entry_id=config_entry_id
                      ) -}}
                    {%- elif config_entry_id -%}
                      {{- dict(
                        title=title | string,
                        listing_name=listing_name | string,
                        supervisor_user_id=supervisor_user_id | int,
                        can_be_picked_by_group_id=
                        can_be_picked_by_group_id | int,
                        can_start_from=can_start_from | trim | string,
                        should_end_by=should_end_by | trim | string,
                        status='pending',
                        categories_map=task_category,
                        description='Battery at '
                        ~ repeat.item.percent
                        ~ '% on '
                        ~ repeat.item.name ~ ' in ' ~ repeat.item.area
                        ~ '\n' ~ task_source_marker,
                        config_entry_id=config_entry_id
                      ) -}}
                    {%- elif assignee_user_id | int > 0 -%}
                      {{- dict(
                        title=title | string,
                        listing_name=listing_name | string,
                        supervisor_user_id=supervisor_user_id | int,
                        can_be_picked_by_group_id=
                        can_be_picked_by_group_id | int,
                        can_start_from=can_start_from | trim | string,
                        should_end_by=should_end_by | trim | string,
                        status='pending',
                        categories_map=task_category,
                        description='Battery at '
                        ~ repeat.item.percent
                        ~ '% on '
                        ~ repeat.item.name ~ ' in ' ~ repeat.item.area
                        ~ '\n' ~ task_source_marker,
                        assignee_user_id=assignee_user_id | int
                      ) -}}
                    {%- else -%}
                      {{- dict(
                        title=title | string,
                        listing_name=listing_name | string,
                        supervisor_user_id=supervisor_user_id | int,
                        can_be_picked_by_group_id=
                        can_be_picked_by_group_id | int,
                        can_start_from=can_start_from | trim | string,
                        should_end_by=should_end_by | trim | string,
                        status='pending',
                        categories_map=task_category,
                        description='Battery at '
                        ~ repeat.item.percent
                        ~ '% on '
                        ~ repeat.item.name ~ ' in ' ~ repeat.item.area
                        ~ '\n' ~ task_source_marker
                      ) -}}
                    {%- endif -%}
                  response_variable: task_result
                - variables:
                    created_tasks: >-
                      {{ created_tasks + [dict(
                        listing_name=repeat.item.area,
                        device_name=repeat.item.name,
                        entity_id=repeat.item.entity_id,
                        battery_percent=repeat.item.percent,
                        battery_type=repeat.item.battery_type,
                        task_id=task_result.id
                          | default(matching_task_info.id, true)
                      )] }}
            - conditions:
                - condition: template
                  value_template: "{{ matching_task_info.id is none }}"
              sequence:
                - action: hostaway.create_task
                  data: >-
                    {%- if config_entry_id and assignee_user_id | int > 0 -%}
                      {{- dict(
                        title=title | string,
                        listing_name=listing_name | string,
                        supervisor_user_id=supervisor_user_id | int,
                        can_be_picked_by_group_id=
                        can_be_picked_by_group_id | int,
                        can_start_from=can_start_from | trim | string,
                        should_end_by=should_end_by | trim | string,
                        status='pending',
                        description='Battery at '
                        ~ repeat.item.percent
                        ~ '% on '
                        ~ repeat.item.name ~ ' in ' ~ repeat.item.area
                        ~ '\n' ~ task_source_marker,
                        assignee_user_id=assignee_user_id | int,
                        config_entry_id=config_entry_id
                      ) -}}
                    {%- elif config_entry_id -%}
                      {{- dict(
                        title=title | string,
                        listing_name=listing_name | string,
                        supervisor_user_id=supervisor_user_id | int,
                        can_be_picked_by_group_id=
                        can_be_picked_by_group_id | int,
                        can_start_from=can_start_from | trim | string,
                        should_end_by=should_end_by | trim | string,
                        status='pending',
                        description='Battery at '
                        ~ repeat.item.percent
                        ~ '% on '
                        ~ repeat.item.name ~ ' in ' ~ repeat.item.area
                        ~ '\n' ~ task_source_marker,
                        config_entry_id=config_entry_id
                      ) -}}
                    {%- elif assignee_user_id | int > 0 -%}
                      {{- dict(
                        title=title | string,
                        listing_name=listing_name | string,
                        supervisor_user_id=supervisor_user_id | int,
                        can_be_picked_by_group_id=
                        can_be_picked_by_group_id | int,
                        can_start_from=can_start_from | trim | string,
                        should_end_by=should_end_by | trim | string,
                        status='pending',
                        description='Battery at '
                        ~ repeat.item.percent
                        ~ '% on '
                        ~ repeat.item.name ~ ' in ' ~ repeat.item.area
                        ~ '\n' ~ task_source_marker,
                        assignee_user_id=assignee_user_id | int
                      ) -}}
                    {%- else -%}
                      {{- dict(
                        title=title | string,
                        listing_name=listing_name | string,
                        supervisor_user_id=supervisor_user_id | int,
                        can_be_picked_by_group_id=
                        can_be_picked_by_group_id | int,
                        can_start_from=can_start_from | trim | string,
                        should_end_by=should_end_by | trim | string,
                        status='pending',
                        description='Battery at '
                        ~ repeat.item.percent
                        ~ '% on '
                        ~ repeat.item.name ~ ' in ' ~ repeat.item.area
                        ~ '\n' ~ task_source_marker
                      ) -}}
                    {%- endif -%}
                  response_variable: task_result
                - variables:
                    created_tasks: >-
                      {{ created_tasks + [dict(
                        listing_name=repeat.item.area,
                        device_name=repeat.item.name,
                        entity_id=repeat.item.entity_id,
                        battery_percent=repeat.item.percent,
                        battery_type=repeat.item.battery_type,
                        task_id=task_result.id
                          | default(matching_task_info.id, true)
                      )] }}
            - conditions:
                - condition: template
                  value_template: >-
                    {{ matching_task_info.id is not none
                       and (
                         matching_task_info.can_start_from
                         != can_start_from | trim
                         or matching_task_info.should_end_by
                         != should_end_by | trim
                       ) }}
              sequence:
                - action: hostaway.update_task
                  data: >-
                    {%- if config_entry_id -%}
                      {{- dict(
                        task_id=matching_task_info.id | int,
                        can_start_from=can_start_from | trim | string,
                        should_end_by=should_end_by | trim | string,
                        config_entry_id=config_entry_id
                      ) -}}
                    {%- else -%}
                      {{- dict(
                        task_id=matching_task_info.id | int,
                        can_start_from=can_start_from | trim | string,
                        should_end_by=should_end_by | trim | string
                      ) -}}
                    {%- endif -%}
                  response_variable: task_result
                - variables:
                    rescheduled_tasks: >-
                      {{ rescheduled_tasks + [dict(
                        listing_name=repeat.item.area,
                        device_name=repeat.item.name,
                        entity_id=repeat.item.entity_id,
                        battery_percent=repeat.item.percent,
                        battery_type=repeat.item.battery_type,
                        task_id=task_result.id
                          | default(matching_task_info.id, true)
                      )] }}
  - repeat:
      for_each: "{{ recovered_batteries }}"
      sequence:
        - variables:
            title: >-
              Replace Batteries: {{ repeat.item.area }}
              - {{ repeat.item.name }} - {{ repeat.item.battery_type }}
            task_source_marker: >-
              Source entity: {{ repeat.item.entity_id }}
        - action: hostaway.get_tasks
          data: >-
            {%- if config_entry_id -%}
              {{- dict(
                listing_name=repeat.item.area | string,
                config_entry_id=config_entry_id
              ) -}}
            {%- else -%}
              {{- dict(listing_name=repeat.item.area | string) -}}
            {%- endif -%}
          response_variable: existing_tasks
        - variables:
            matching_task_info: >-
              {% set ns = namespace(tid=none) %}
              {% for task in existing_tasks.tasks | default([], true) %}
                {% if ns.tid is none %}
                  {% set task_title =
                    task.title | default('', true) | string %}
                  {% set task_description =
                    task.description | default('', true) | string %}
                  {% if (task_source_marker in task_description
                     or task_title == title)
                     and task.status | default('', true)
                     not in ['completed', 'cancelled'] %}
                    {% set ns.tid = task.id %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ dict(id=ns.tid) }}
        - if:
            - condition: template
              value_template: "{{ matching_task_info.id is not none }}"
          then:
            - action: hostaway.update_task
              data: >-
                {%- if config_entry_id -%}
                  {{- dict(
                    task_id=matching_task_info.id | int,
                    status='completed',
                    resolution_note='Battery replaced - '
                    ~ repeat.item.name
                    ~ ' now at '
                    ~ repeat.item.percent
                    ~ '%',
                    config_entry_id=config_entry_id
                  ) -}}
                {%- else -%}
                  {{- dict(
                    task_id=matching_task_info.id | int,
                    status='completed',
                    resolution_note='Battery replaced - '
                    ~ repeat.item.name
                    ~ ' now at '
                    ~ repeat.item.percent
                    ~ '%'
                  ) -}}
                {%- endif -%}
              response_variable: task_result
            - variables:
                completed_tasks: >-
                  {{ completed_tasks + [dict(
                    listing_name=repeat.item.area,
                    device_name=repeat.item.name,
                    entity_id=repeat.item.entity_id,
                    battery_percent=repeat.item.percent,
                    battery_type=repeat.item.battery_type,
                    task_id=task_result.id
                      | default(matching_task_info.id, true)
                  )] }}
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ created_tasks | count > 0 }}"
        sequence:
          - variables:
              tasks: "{{ created_tasks }}"
          - choose: []
            default: !input on_task_created
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ rescheduled_tasks | count > 0 }}"
        sequence:
          - variables:
              tasks: "{{ rescheduled_tasks }}"
          - choose: []
            default: !input on_task_rescheduled
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ completed_tasks | count > 0 }}"
        sequence:
          - variables:
              tasks: "{{ completed_tasks }}"
          - choose: []
            default: !input on_task_completed

mode: single
